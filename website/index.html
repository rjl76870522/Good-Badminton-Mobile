<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Good-Badminton — 看见每一次移动。" />
    <title>Good-Badminton</title>
    <link rel="stylesheet" href="./landing.css?v=20260711-1" />
  </head>
  <body>
    <header class="header">
      <a class="logo" href="#home" aria-label="Good-Badminton 首页"><b>GOOD</b><span>BADMINTON</span></a>
      <nav class="desktop-nav" aria-label="主导航">
        <a href="#vision">VISION</a><a href="#motion">MOTION</a><a href="#court">THE COURT</a>
      </nav>
      <button class="menu-button" type="button" aria-label="打开菜单" aria-expanded="false"><i></i><i></i><i></i></button>
    </header>

    <nav class="menu-panel" aria-label="移动端导航">
      <a href="#vision">VISION</a><a href="#motion">MOTION</a><a href="#court">THE COURT</a>
      <a href="./privacy.html">PRIVACY</a><a href="./support.html">SUPPORT</a>
    </nav>

    <main>
      <section class="panel hero" id="home">
        <video class="background" autoplay muted loop playsinline poster="./assets/webui0.png">
          <source src="./assets/demo.gif" type="image/gif" />
        </video>
        <img class="background fallback" src="./assets/demo.gif" alt="羽毛球比赛画面" />
        <div class="shade"></div>
        <div class="content">
          <p>GOOD-BADMINTON</p>
          <h1>掌控<br />每一拍</h1>
          <a class="outline-button" href="#vision"><span>探索</span></a>
        </div>
        <a class="down" href="#vision" aria-label="向下滚动"></a>
      </section>

      <section class="panel vision" id="vision">
        <img class="background" src="./assets/match_heatmap.png" alt="球场移动热力视觉" />
        <div class="shade"></div>
        <div class="content">
          <p>SEE WHAT OTHERS MISS</p>
          <h2>看见<br />隐藏的轨迹</h2>
          <a class="outline-button" href="#motion"><span>继续</span></a>
        </div>
        <a class="down" href="#motion" aria-label="向下滚动"></a>
      </section>

      <section class="panel motion" id="motion">
        <img class="background" src="./assets/webui1.png" alt="羽毛球运动分析画面" />
        <div class="shade"></div>
        <div class="content right">
          <p>BUILT FOR MOTION</p>
          <h2>速度<br />从不等待</h2>
          <a class="outline-button" href="#court"><span>下一幕</span></a>
        </div>
        <a class="down" href="#court" aria-label="向下滚动"></a>
      </section>

      <section class="panel court" id="court">
        <img class="background" src="./assets/demo.gif" alt="羽毛球球场" />
        <div class="shade"></div>
        <div class="content">
          <p>THE NEXT POINT IS YOURS</p>
          <h2>下一分<br />由你定义</h2>
          <a class="outline-button" href="#home"><span>返回顶部</span></a>
        </div>
      </section>
    </main>

    <footer><span>GOOD-BADMINTON © 2026</span><nav><a href="./privacy.html">PRIVACY</a><a href="./support.html">SUPPORT</a></nav></footer>
    <script src="./landing.js?v=20260711-1"></script>
  </body>
</html>
