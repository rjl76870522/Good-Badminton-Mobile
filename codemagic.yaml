workflows:
  ios-unsigned:
    name: Good-Badminton iOS unsigned verification
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: frontend_flutter

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "ios/*"
          include: true
          source: true
      cancel_previous_builds: true

    environment:
      flutter: 3.44.5
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: https://api.audacity6441.kdns.fr

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Prepare Flutter iOS toolchain
        script: |
          flutter config --enable-swift-package-manager
          flutter precache --ios
          flutter pub get

      - name: Check iOS project configuration
        script: |
          plutil -lint ios/Runner/Info.plist
          grep -q "com.rundon2026.goodbadminton" \
            ios/Runner.xcodeproj/project.pbxproj
          grep -q "NSLocalNetworkUsageDescription" ios/Runner/Info.plist
          xcodebuild -project ios/Runner.xcodeproj -scheme Runner -showBuildSettings >/dev/null

      - name: Analyze Flutter code
        script: flutter analyze

      - name: Run Flutter tests
        script: flutter test

      - name: Build unsigned iOS release
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL="$API_BASE_URL"

    artifacts:
      - $CM_BUILD_DIR/frontend_flutter/build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.log

  ios-simulator-preview:
    name: Good-Badminton iOS simulator preview
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: frontend_flutter

    environment:
      flutter: 3.44.5
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: https://api.audacity6441.kdns.fr

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Check iOS project configuration
        script: |
          plutil -lint ios/Runner/Info.plist
          grep -q "com.rundon2026.goodbadminton" \
            ios/Runner.xcodeproj/project.pbxproj
          grep -q "NSLocalNetworkUsageDescription" ios/Runner/Info.plist

      - name: Analyze Flutter code
        script: flutter analyze

      - name: Run Flutter tests
        script: flutter test

      - name: Build iOS simulator app
        script: |
          flutter build ios --simulator --debug \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=BUILD_REVISION="$CM_COMMIT"

      - name: Package simulator app for Appetize
        script: |
          cd build/ios/iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent \
            Runner.app Runner-simulator.zip

    artifacts:
      - $CM_BUILD_DIR/frontend_flutter/build/ios/iphonesimulator/Runner.app
      - $CM_BUILD_DIR/frontend_flutter/build/ios/iphonesimulator/Runner-simulator.zip
      - /tmp/xcodebuild_logs/*.log
