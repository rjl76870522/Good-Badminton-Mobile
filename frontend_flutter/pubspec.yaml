name: good_badminton_mobile
description: Good-Badminton mobile client for the FastAPI Mobile API.
publish_to: "none"
version: 0.1.2+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.3
  http: ^1.2.2
  shared_preferences: ^2.5.5
  video_player: ^2.11.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  gal: ^2.3.2
  qr_code_dart_scan: 0.11.5
  permission_handler: ^12.0.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/badminton_dashboard_bg.png
    - assets/images/history_court_bg.png
    - assets/images/cai_xukun_waiting.gif
    - assets/videos/demo01.mp4
    - assets/videos/demo02.mp4
